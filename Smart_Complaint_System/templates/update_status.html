<!DOCTYPE html>
<html>
<head>
<title>Update Status</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body>

<nav class="navbar navbar-expand-lg shadow"
     style="background: linear-gradient(90deg, #0f172a, #1e3a8a);">

    <div class="container-fluid">

        <a class="navbar-brand fw-bold fs-4 text-white d-flex align-items-center" href="/">

    <img src="{{ url_for('static', filename='images/logo.jpeg') }}"
         width="42"
         height="42"
         class="me-2 rounded-circle">

    <span style="letter-spacing:1px;">
        Smart Complaint System
    </span>

</a>

        <div>

            <a href="/admin_dashboard" class="btn btn-primary rounded-pill px-4">
                Dashboard
            </a>

            <a href="/logout" class="btn btn-danger rounded-pill px-4">
                Logout
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

<div class="card shadow">

<div class="card-body">

<h2 class="text-center mb-4">
    <i class="bi bi-arrow-repeat"></i>
    Update Complaint Status
</h2>

<p class="text-center text-muted">
    Select the latest status for this complaint.
</p>

<form method="POST">

<select
class="form-select mb-3"
name="status"
required>

<option value="Pending">Pending</option>

<option value="In Progress">In Progress</option>

<option value="Resolved">Resolved</option>

<option value="Rejected">Rejected</option>

</select>

<br><br>

<button
type="submit"
class="btn btn-warning w-100">

<i class="bi bi-check-circle"></i>
Update Status

</button>

</form>

<br>

<a
href="/admin_dashboard"
class="btn btn-secondary mt-3">

<i class="bi bi-arrow-left"></i>
Back to Dashboard

</a>

</div>
</div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">

    © 2026 Smart Complaint Management & Tracking System |
    Developed by <strong>Raushan Kumar Lal</strong>

</footer>

</body>
</html>
