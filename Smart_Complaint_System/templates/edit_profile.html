<!DOCTYPE html>
<html>
<head>

<title>Edit Profile</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

<nav class="navbar navbar-expand-lg shadow"
     style="background: linear-gradient(90deg, #0f172a, #1e3a8a);">

    <div class="container-fluid">

        <a class="navbar-brand fw-bold fs-4 text-white d-flex align-items-center" href="/">

    <img src="{{ url_for('static', filename='images/logo.jpeg') }}"
         width="42"
         height="42"
         class="me-2 rounded-circle">

    <span style="letter-spacing:1px;">
        Smart Complaint System
    </span>

</a>

        <div>

            <a href="/profile" class="btn btn-primary rounded-pill px-4">
                Profile
            </a>

            <a href="/dashboard" class="btn btn-success rounded-pill px-4">
                Dashboard
            </a>

            <a href="/logout" class="btn btn-danger rounded-pill px-4">
                Logout
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

<div class="card shadow">

<div class="card-body">

<h2 class="text-center mb-4">
    <i class="bi bi-pencil-square"></i>
    Edit Profile
</h2>

<p class="text-center text-muted">
    Update your personal information.
</p>

<form method="POST">

<input
type="text"
class="form-control mb-3"
name="name"
value="{{ user[0] }}"
required>

<input
type="email"
class="form-control mb-3"
value="{{ user[1] }}"
disabled>

<input
type="text"
class="form-control mb-3"
name="mobile"
value="{{ user[2] }}"
required>

<button
type="submit"
class="btn btn-warning w-100">

<i class="bi bi-check-circle"></i>
Update Profile

</button>

</form>

<br>

<a href="/profile" class="btn btn-secondary mt-3">

<i class="bi bi-arrow-left"></i>
Back

</a>

</div>
</div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">

    © 2026 Smart Complaint Management & Tracking System |
    Developed by <strong>Raushan Kumar Lal</strong>

</footer>

</body>

</html>
