<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Complaint</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>
<body>

<nav class="navbar navbar-expand-lg shadow"
     style="background: linear-gradient(90deg, #0f172a, #1e3a8a);">

    <div class="container-fluid">

        <a class="navbar-brand fw-bold fs-4 text-white d-flex align-items-center" href="/">

        <img src="{{ url_for('static', filename='images/logo.jpeg') }}"
             width="42"
             height="42"
             class="me-2 rounded-circle">

        <span style="letter-spacing:1px;">
            Smart Complaint System
        </span>

        </a>

        <div>

            <a href="/dashboard" class="btn btn-primary rounded-pill px-4">
                Dashboard
            </a>

            <a href="/history" class="btn btn-info text-white rounded-pill px-4">
                History
            </a>

            <a href="/logout" class="btn btn-danger rounded-pill px-4">
                Logout
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

<div class="card shadow">

<div class="card-body">

<h2 class="text-center mb-4">
    <i class="bi bi-pencil-square"></i>
    Submit Complaint
</h2>

<p class="text-center text-muted">
    Fill in the details below to register your complaint.
</p>

<form action="/complaint" method="POST" enctype="multipart/form-data">

<input
type="text"
class="form-control mb-3"
name="title"
placeholder="Complaint Title"
required>

<select class="form-select mb-3" name="category" required>

<option value="">Select Category</option>

<option>Electrical</option>

<option>Internet</option>

<option>Furniture</option>

<option>Plumbing</option>

<option>Cleaning</option>

<option>Other</option>

</select>

<select class="form-select mb-3" name="priority">

<option>Low</option>

<option>Medium</option>

<option>High</option>

<option>Critical</option>

</select>

<textarea
class="form-control mb-3"
name="description"
placeholder="Describe your complaint"
rows="5"
required></textarea>

<input
class="form-control mb-3"
type="file"
name="image">

<button
type="submit"
class="btn btn-primary w-100">

<i class="bi bi-send-fill"></i>
Submit Complaint

</button>>

</form>

</div>
</div>
</div>

<footer class="bg-dark text-white text-center p-3 mt-5">

    © 2026 Smart Complaint Management & Tracking System |
    Developed by <strong>Raushan Kumar Lal</strong>

</footer>

</body>
</html>
